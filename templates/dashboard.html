<!DOCTYPE html>
<html>
<head>

<title>Password Vault</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="vault-container">

<h2>Password Vault</h2>

<button onclick="toggleDark()">Toggle Dark Mode</button>

<br><br>

<input type="text" id="search" placeholder="Search website..." onkeyup="searchVault()">

<br><br>

<form method="POST" action="/add">

<input name="site" placeholder="Website">

<input name="username" placeholder="Username">

<input id="password" name="password" placeholder="Password" onkeyup="checkStrength()">

<div id="strength" class="strength"></div>

<button type="button" onclick="generate()">Generate</button>

<button>Add Credential</button>

</form>

<hr>


<br>

<a href="/export">
<button>Export Vault</button>
</a>

<form action="/import" method="POST" enctype="multipart/form-data">

<input type="file" name="file" required>

<button>Import Vault</button>

</form>

<hr>

<div id="vault">

{% for p in passwords %}

<div class="credential">

<div>

<b class="site">{{p.site}}</b><br>

User: {{p.username}}<br>

Password:
<span class="pass" style="filter:blur(5px)">{{p.password}}</span>
</div>

<div class="actions">

<button onclick="togglePassword(this)">Show</button>

<button onclick="copyPassword(this)">Copy</button>

<a class="delete-btn" href="/delete/{{p.id}}">Delete</a>

</div>

</div>

{% endfor %}

</div>

<br>

<a href="/logout">Logout</a>

</div>

<script>

function togglePassword(btn){

let pass = btn.parentElement.parentElement.querySelector(".pass")

if(pass.style.filter=="blur(5px)"){
pass.style.filter="none"
btn.innerText="Hide"
}else{
pass.style.filter="blur(5px)"
btn.innerText="Show"
}

}

function copyPassword(btn){

let pass = btn.parentElement.parentElement.querySelector(".pass").innerText

navigator.clipboard.writeText(pass)

alert("Password copied")

}

function generate(){

fetch("/generate")
.then(res=>res.text())
.then(data=>{
document.getElementById("password").value=data
})

}

function searchVault(){

let input = document.getElementById("search").value.toLowerCase()

let sites = document.getElementsByClassName("credential")

for(let i=0;i<sites.length;i++){

let site = sites[i].querySelector(".site").innerText.toLowerCase()

sites[i].style.display = site.includes(input) ? "flex" : "none"

}

}

function checkStrength(){

let p = document.getElementById("password").value
let strength = document.getElementById("strength")

if(p.length<6){
strength.innerText="Weak"
strength.style.color="red"
}
else if(p.length<10){
strength.innerText="Medium"
strength.style.color="orange"
}
else{
strength.innerText="Strong"
strength.style.color="green"
}

}

function toggleDark(){

document.body.classList.toggle("dark-mode")

}

</script>

</body>
</html>
